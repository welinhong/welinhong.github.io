---
title: Blog
---
<h1>Latest Posts</h1>

<ul>
    <!--Jekyll makes posts available at site.posts.-->
    {% for post in site.posts %}
    <li>
        <!--title: post fileename or the title in front matter-->
        <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>

        <!--excerpt: first paragraph of content by default-->
        <p>{{ post.excerpt }}</p>
    </li>
    {% endfor %}
</ul>
